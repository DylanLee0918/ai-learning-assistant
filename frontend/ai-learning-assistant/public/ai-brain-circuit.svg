<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DDBA8" />
      <stop offset="100%" stop-color="#0FC48C" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)" />

  <!-- 
    Brain icon traced from image:
    Left lobe + right lobe with circuit nodes sticking out
    Stroke only, white, rounded caps
  -->
  <g stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- CENTER DIVIDER LINE (vertical spine) -->
    <line x1="50" y1="36" x2="50" y2="67" />

    <!-- ===== LEFT LOBE ===== -->
    <!-- Outer lobe shape -->
    <path d="
      M 50,40
      C 49,37 46,35 43,35
      C 39,35 36,37 35,40
      C 33,38 30,39 30,42
      C 29,44 30,47 33,48
      C 31,50 31,53 33,55
      C 32,57 33,60 36,61
      C 37,64 40,66 43,66
      C 46,66 49,64 50,62
    " />

    <!-- LEFT lobe inner horizontal line (mid) -->
    <line x1="34" y1="51" x2="42" y2="51" />
    <!-- LEFT lobe inner vertical connector -->
    <line x1="42" y1="51" x2="42" y2="58" />
    <!-- LEFT lobe top inner line -->
    <line x1="38" y1="42" x2="44" y2="42" />
    <line x1="44" y1="42" x2="44" y2="47" />
    <line x1="44" y1="47" x2="38" y2="47" />

    <!-- LEFT external connector top -->
    <line x1="30" y1="42" x2="26" y2="42" />
    <!-- LEFT external connector mid -->
    <line x1="31" y1="51" x2="26" y2="51" />
    <!-- LEFT external connector bottom -->
    <line x1="36" y1="61" x2="36" y2="65" />

    <!-- ===== RIGHT LOBE ===== -->
    <path d="
      M 50,40
      C 51,37 54,35 57,35
      C 61,35 64,37 65,40
      C 67,38 70,39 70,42
      C 71,44 70,47 67,48
      C 69,50 69,53 67,55
      C 68,57 67,60 64,61
      C 63,64 60,66 57,66
      C 54,66 51,64 50,62
    " />

    <!-- RIGHT lobe inner horizontal line (mid) -->
    <line x1="66" y1="51" x2="58" y2="51" />
    <!-- RIGHT lobe inner vertical connector -->
    <line x1="58" y1="51" x2="58" y2="58" />
    <!-- RIGHT lobe top inner line -->
    <line x1="62" y1="42" x2="56" y2="42" />
    <line x1="56" y1="42" x2="56" y2="47" />
    <line x1="56" y1="47" x2="62" y2="47" />

    <!-- RIGHT external connector top -->
    <line x1="70" y1="42" x2="74" y2="42" />
    <!-- RIGHT external connector mid -->
    <line x1="69" y1="51" x2="74" y2="51" />
    <!-- RIGHT external connector bottom -->
    <line x1="64" y1="61" x2="64" y2="65" />

  </g>

  <!-- Node dots LEFT -->
  <circle cx="26" cy="42" r="2.3" fill="white" />
  <circle cx="26" cy="51" r="2.3" fill="white" />
  <circle cx="36" cy="65" r="2.3" fill="white" />

  <!-- Node dots RIGHT -->
  <circle cx="74" cy="42" r="2.3" fill="white" />
  <circle cx="74" cy="51" r="2.3" fill="white" />
  <circle cx="64" cy="65" r="2.3" fill="white" />

</svg>
